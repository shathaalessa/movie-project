{% extends "movies/layout.html" %}

{% block content %}

<h2>{{ movie.title }}</h2>

<img src="{{ movie.image }}" class="img-fluid mb-3" style="max-height:300px;">

<p><strong>Genre:</strong> {{ movie.genre }}</p>
<p><strong>Year:</strong> {{ movie.release_year }}</p>
<p>{{ movie.description }}</p>

<h4>⭐ Average Rating: {{ average|floatformat:1 }}</h4>

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Rate this movie:</label>
        <div class="d-flex gap-2">
            {% for i in "12345" %}
            <button type="submit" name="score" value="{{ i }}" class="btn btn-outline-warning">
                ⭐ {{ i }}
            </button>
            {% endfor %}
        </div>
    </div>

</form>

<a href="{% url 'movies:update_movie' movie.id %}" class="btn btn-warning mt-3">Edit</a>
<a href="{% url 'movies:delete_movie' movie.id %}" class="btn btn-danger mt-3">Delete</a>

{% endblock %}
