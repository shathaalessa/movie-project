<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1f1c2c, #928dab);
            min-height: 100vh;
        }

        .content-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand" href="{% url 'movies:movie_list' %}">🎬 Movies</a>

        <div>
            <a class="btn btn-light me-2" href="{% url 'movies:add_movie' %}">Add Movie</a>
            <a class="btn btn-warning me-2" href="{% url 'movies:my_ratings' %}">My Ratings</a>
            <a class="btn btn-danger" href="{% url 'movies:logout' %}">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="content-box">
        {% block content %}
        {% endblock %}
    </div>
</div>

</body>
</html>
