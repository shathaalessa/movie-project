<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'movies:movie_list' %}">🎬 Movies</a>

        <div>
            <a class="btn btn-light me-2" href="{% url 'movies:add_movie' %}">Add Movie</a>
            <a class="btn btn-warning me-2" href="#">My Ratings</a>
            <a class="btn btn-danger" href="{% url 'movies:logout' %}">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
