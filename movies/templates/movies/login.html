<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(to right, #1f1c2c, #928dab);">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg rounded-4" style="width:350px;">

        <h3 class="text-center mb-3">🎬 Login</h3>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control mb-3" name="username" placeholder="Username">
            <input type="password" class="form-control mb-3" name="password" placeholder="Password">

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <a href="{% url 'movies:register' %}" class="text-center mt-3 d-block">
            Create new account
        </a>

    </div>
</div>

</body>
</html>
