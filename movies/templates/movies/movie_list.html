{% extends "layout.html" %}

{% block body %}

<h1>All Movies</h1>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Genre</th>
        <th>Year</th>
    </tr>

    {% for movie in movies %}
    <tr>
        <td>
        <a href="{% url 'movie_detail' movie.id %}">
                {{ movie.title }}
            </a>
        </td>
        <td>{{ movie.genre }}</td>
        <td>{{ movie.release_year }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
