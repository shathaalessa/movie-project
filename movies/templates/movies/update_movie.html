<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center">Update Movie</h2>

        <form method="POST">
            {% csrf_token %}

            <input name="title" class="form-control mb-2" value="{{ movie.title }}">
            <textarea name="description" class="form-control mb-2">{{ movie.description }}</textarea>
            <input name="genre" class="form-control mb-2" value="{{ movie.genre }}">
            <input name="image" class="form-control mb-2" value="{{ movie.image }}">
            <input name="release_year" class="form-control mb-2" value="{{ movie.release_year }}">

            <button class="btn btn-warning w-100">Update</button>
        </form>
    </div>
</div>
