<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center">Add Movie</h2>

        <form method="POST">
            {% csrf_token %}

            <input name="title" class="form-control mb-2" placeholder="Title">
            <textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>
            <input name="genre" class="form-control mb-2" placeholder="Genre">
            <input name="image" class="form-control mb-2" placeholder="Image URL">
            <input name="release_year" class="form-control mb-2" placeholder="Year">

            <button class="btn btn-primary w-100">Add Movie</button>
        </form>
    </div>
</div>
